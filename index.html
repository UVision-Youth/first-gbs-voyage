<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>갈릴리 항해사 자격시험: 폭풍 탈출</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --storm-dark: #0a0e1a; --white: #ffffff; --gold: #f5c842; --red-flash: rgba(200,0,0,0.55); }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--storm-dark); color: var(--white); touch-action: none; -webkit-user-select: none; user-select: none; }

    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; z-index: 1; }
    .screen.active { opacity: 1; pointer-events: all; }

    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d) infinite alternate; }
    @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

    #lightning { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0; background: rgba(255,255,255,0.18); }
    #rain-container { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .raindrop { position: absolute; top: -20px; width: 2px; border-radius: 2px; background: linear-gradient(to bottom, transparent, #8ecae6); animation: fall var(--s) linear infinite; opacity: 0.7; }
    @keyframes fall { to { transform: translateY(110vh); } }

    #boat-icon { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 52px; z-index: 3; pointer-events: none; animation: rock 2s ease-in-out infinite; }
    @keyframes rock { 0%,100% { transform: translateX(-50%) rotate(-8deg); } 50% { transform: translateX(-50%) rotate(8deg); } }

    /* Intro */
    #screen-intro { gap: 18px; }
    .intro-title { text-align: center; }
    .intro-title .main { font-size: 42px; font-weight: 900; background: linear-gradient(135deg, #f5c842, #ff9f43); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .user-info-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 260px; }
    .user-info-form select, .user-info-form input { padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; color: white; text-align: center; }
    .btn-start { background: linear-gradient(135deg, #f5c842, #ff9f43); color: #1a1a1a; border: none; border-radius: 50px; padding: 16px 48px; font-size: 18px; font-weight: 800; cursor: pointer; }

    /* Game */
    #water-fill { position: fixed; bottom: 0; left: 0; right: 0; height: 60%; background: linear-gradient(to bottom, #1e90ff88, #0057b8cc); transition: height 0.35s ease; z-index: 3; }
    #game-hud { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 20px; background: linear-gradient(to bottom, rgba(10,14,26,0.95), transparent); }
    /* 게임 전체 화면을 감싸서 드래그가 끊기지 않게 함 */
    #game-tap-area { position: fixed; inset: 0; z-index: 4; touch-action: none; }
    .bucket-pop { position: fixed; font-size: 28px; pointer-events: none; z-index: 9; animation: bucket-fly 0.8s ease-out forwards; }
    @keyframes bucket-fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(0.4); opacity: 0; } }

    /* Quiz */
    #screen-quiz { background: linear-gradient(160deg, #0a1628 0%, #0d2137 100%); gap: 20px; }
    .quiz-card { background: rgba(255,255,255,0.07); border-radius: 20px; padding: 28px 20px; width: 100%; max-width: 400px; }
    .ox-btn { padding: 18px 40px; font-size: 36px; border: 2px solid rgba(255,255,255,0.2); border-radius: 16px; background: rgba(255,255,255,0.05); color: white; }
    .subj-input { width: 100%; padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; border: none; text-align: center; }
    
    #wrong-overlay { position: fixed; inset: 0; z-index: 20; background: var(--red-flash); opacity: 0; pointer-events: none; transition: opacity 0.1s; }
    #wrong-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 21; background: #c0392b; padding: 20px; border-radius: 16px; opacity: 0; transition: all 0.2s; pointer-events: none; }
    #wrong-msg.show { opacity: 1; }
    
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .dot.done { background: #f5c842; }
    .dot.active { background: #4fc3f7; }
  </style>
</head>
<body>

<div id="starfield"></div>
<div id="rain-container"></div>
<div id="lightning"></div>
<span id="boat-icon">⛵</span>

<section class="screen active" id="screen-intro">
  <div class="intro-title"><span class="main">폭풍 탈출</span></div>
  <div class="user-info-form">
    <select id="sun-select"><option value="" disabled selected>순 선택</option></select>
    <input type="text" id="name-input" placeholder="이름을 입력하세요" />
  </div>
  <button class="btn-start" id="btn-start">⚓ 항해 시작!</button>
</section>

<section class="screen" id="screen-game">
  <div id="game-tap-area"></div>
  <div id="water-fill"></div>
  <div id="game-hud">
    <div id="instruction">물 퍼내기 미션!<br><span>아래쪽 물을 터치하여 위로 드래그하세요!</span></div>
    <div id="touch-count" style="text-align:center; font-size:40px; font-weight:900;">0 / 30</div>
  </div>
</section>

<section class="screen" id="screen-quiz">
  <div class="quiz-dots" id="quiz-dots" style="display:flex; gap:8px;"></div>
  <div class="quiz-q" id="quiz-q" style="padding:20px; text-align:center;"></div>
  <div class="quiz-card" id="quiz-card"></div>
</section>

<section class="screen" id="screen-end">
  <div class="main">미션 성공!</div>
  <button class="btn-restart" id="btn-restart">🔄 다시하기</button>
</section>

<div id="wrong-overlay"></div>
<div id="wrong-msg"><div class="txt" id="wrong-txt" style="font-weight:bold;">다시 생각해봐요!</div></div>

<script>
const $ = id => document.getElementById(id);
let touchCount = 0; let currentGoal = 30; let startY = 0;

// Setup
(function() {
  const sunSelect = $('sun-select');
  Array.from({length: 13}, (_, i) => i + 1).sort(() => Math.random() - 0.5).forEach(s => {
    let opt = document.createElement('option'); opt.value = s + '순'; opt.textContent = s + '순'; sunSelect.appendChild(opt);
  });
  $('btn-start').onclick = () => { if($('sun-select').value && $('name-input').value) startGame(); else alert("정보를 입력하세요"); };
})();

function startGame() { showScreen('game'); touchCount = 0; updateUI(); }
function showScreen(name) {
  Object.values({intro:$('screen-intro'), game:$('screen-game'), quiz:$('screen-quiz'), end:$('screen-end')}).forEach(s => s.classList.remove('active'));
  $(name === 'game' ? 'screen-game' : name === 'quiz' ? 'screen-quiz' : name === 'end' ? 'screen-end' : 'screen-intro').classList.add('active');
}

function updateUI() {
  $('touch-count').textContent = touchCount + " / " + currentGoal;
  const waterH = 60 - (touchCount / currentGoal) * 50;
  $('water-fill').style.height = `${waterH}%`;
}

// 드래그 로직 (화면 전체 감지)
$('game-tap-area').addEventListener('touchstart', (e) => {
  startY = e.touches[0].clientY;
  // 현재 물 높이 확인 (물 높이 퍼센트 계산)
  const waterHeightPx = (currentGoal > 0) ? (window.innerHeight * (60 - (touchCount / currentGoal) * 50) / 100) : 0;
  // 시작점이 물 영역(아래쪽)인지 확인
  if (startY < (window.innerHeight - waterHeightPx - 50)) { startY = -1; } 
}, { passive: false });

$('game-tap-area').addEventListener('touchend', (e) => {
  if (startY === -1) return; // 물 영역 밖에서 시작했으면 무시
  const endY = e.changedTouches[0].clientY;
  if (startY - endY > 50) { // 위로 드래그
    touchCount++;
    updateUI();
    spawnBucket(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    if (touchCount >= currentGoal) showQuiz(0);
  }
}, { passive: false });

function spawnBucket(x, y) {
  const b = document.createElement('div'); b.className = 'bucket-pop'; b.textContent = '🪣';
  b.style.left = `${x-18}px`; b.style.top = `${y-18}px`; document.body.appendChild(b);
  b.addEventListener('animationend', () => b.remove());
}

/* Quiz Logic */
const QUIZZES = [
  { type: 'ox', q: '제자들은 갈릴리 바다의 베테랑 어부였기 때문에 폭풍을 두려워하지 않았다.', answer: 'X' },
  { type: 'ox', q: '갈릴리 바다는 분지 지형이라 찬 공기가 내려오면 순식간에 예고 없는 광풍으로 변한다.', answer: 'O' },
  { type: 'ox', q: '숙련된 어부(제자들)가 광풍 앞에서 패닉에 빠진 이유는 그들의 실력이나 준비가 부족했기 때문이다.', answer: 'X' },
  { type: 'ox', q: '예수님이 "너희 믿음이 어디 있느냐"라고 질문하신 것은, 제자들에게 믿음이 아예 없다고 질책하신 것이다.', answer: 'X' },
  { type: 'ox', q: '헬라어 \'피스티스(믿음)\'는 위기 앞에서 전적으로 의지하며 \'몸을 기댄다\'는 뜻을 가지고 있다.', answer: 'O' },
  { type: 'ox', q: '위급한 상황에서 본능적으로 하나님을 찾는 것 자체가 \'진짜 믿음\'을 가졌다는 가장 확실한 증거이다.', answer: 'X' },
  { type: 'ox', q: '믿는 사람과 믿지 않는 사람의 차이는 고난의 크기가 아니라 폭풍 속에서 \'어떤 대상을 붙드는가\'이다.', answer: 'O' },
  { type: 'ox', q: '흔들리지 않는 믿음을 발휘하기 위해서는 일상 속 작은 폭풍에서부터 예수님을 의지하는 연습이 필요하다.', answer: 'O' },
  { type: 'ox', q: '제자들은 광풍 사건을 겪은 후에도 예수님을 여전히 \'좋은 선생님\'으로만 여겼다.', answer: 'X' },
  { type: 'subj', q: '예수님께서 바람과 물결을 꾸짖어 잠잠하게 하신 것은 그분이 단순한 위인이 아니라 \'이것\'임을 보여준다.', contains: ['하나님', '창조주'] },
];

let currentQ = 0;
function showQuiz(idx) {
  currentQ = idx;
  showScreen('quiz');
  const q = QUIZZES[currentQ];
  $('quiz-q').textContent = q.q;
  const dots = $('quiz-dots'); dots.innerHTML = '';
  QUIZZES.forEach((_, i) => { const d = document.createElement('div'); d.className = 'dot ' + (i < idx ? 'done' : (i === idx ? 'active' : '')); dots.appendChild(d); });
  
  const card = $('quiz-card'); card.innerHTML = '';
  if (q.type === 'ox') {
    ['O','X'].forEach(val => {
      const btn = document.createElement('button'); btn.className = 'ox-btn'; btn.textContent = val === 'O' ? '⭕' : '❌';
      btn.onclick = () => checkAnswer(val); card.appendChild(btn);
    });
  } else {
    card.innerHTML = `<input class="subj-input" id="subj-input" placeholder="정답 입력..." /><button class="btn-submit" id="btn-submit">확인</button>`;
    $('btn-submit').onclick = () => checkAnswer($('subj-input').value);
  }
}

function checkAnswer(val) {
  const q = QUIZZES[currentQ];
  const correct = (q.type === 'ox') ? (val === q.answer) : q.contains.some(k => val.includes(k));
  if (correct) {
    currentQ++;
    if (currentQ >= QUIZZES.length) { showScreen('end'); /* Webhook logic here */ } else showQuiz(currentQ);
  } else {
    currentGoal *= 2; touchCount = 0;
    $('wrong-overlay').style.opacity = '1'; $('wrong-msg').classList.add('show');
    setTimeout(() => { $('wrong-overlay').style.opacity = '0'; $('wrong-msg').classList.remove('show'); startGame(); }, 1500);
  }
}

$('btn-restart').onclick = () => location.reload();
</script>
</body>
</html>
